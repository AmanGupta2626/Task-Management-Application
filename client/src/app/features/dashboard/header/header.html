<header class="flex h-16 items-center justify-end gap-4 border-b border-white/10 bg-ink-900/40 px-5 backdrop-blur-xl sm:px-8">
  <button class="icon-btn" aria-label="Notifications">
    <svg viewBox="0 0 24 24" fill="none" class="h-5 w-5">
      <path d="M15 17h5l-1.4-1.4A2 2 0 0118 14.2V11a6 6 0 10-12 0v3.2a2 2 0 01-.6 1.4L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
  </button>

  <div class="relative">
    <button class="flex items-center gap-3" (click)="toggleMenu()">
      <div class="hidden text-right sm:block">
        <div class="text-sm font-semibold leading-tight text-white">{{ auth.currentUser()?.username }}</div>
        <div class="text-[10px] font-semibold tracking-widest text-slate-400">{{ roleTitle() }}</div>
      </div>
      <span class="grid h-9 w-9 place-items-center rounded-full bg-gradient-to-br from-brand-500 to-violet-500 text-sm font-bold text-white ring-2 ring-white/20">
        {{ initial() }}
      </span>
    </button>

    @if (menuOpen()) {
      <div class="absolute right-0 top-12 z-50 w-44 overflow-hidden rounded-xl border border-white/10 bg-ink-800 shadow-glow">
        <div class="border-b border-white/10 px-4 py-3">
          <div class="truncate text-sm font-semibold text-white">{{ auth.currentUser()?.username }}</div>
          <div class="truncate text-xs text-slate-400">{{ auth.currentUser()?.email }}</div>
        </div>
        <button (click)="logout()" class="flex w-full items-center gap-2 px-4 py-2.5 text-left text-sm font-medium text-rose-300 transition hover:bg-white/5">
          <svg viewBox="0 0 24 24" fill="none" class="h-4 w-4">
            <path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h6a2 2 0 012 2v1"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
          Logout
        </button>
      </div>
    }
  </div>
</header>
