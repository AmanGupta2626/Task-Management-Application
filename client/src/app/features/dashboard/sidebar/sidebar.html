<aside class="sticky top-0 flex h-screen w-16 shrink-0 flex-col gap-6 border-r border-white/10 bg-slate-900 px-3 py-5 lg:w-60 lg:px-4">
    <div class="flex items-center gap-3 px-1">
        <span class="grid h-10 w-10 shrink-0 place-items-center rounded-xl bg-gradient-to-br from-brand-500 to-violet-500 text-white shadow-soft">
      <svg viewBox="0 0 24 24" fill="none" class="h-5 w-5">
        <path d="M13 2L4.5 13H11l-1 9 8.5-11H12l1-9z" fill="currentColor" />
      </svg>
    </span>
        <div class="hidden lg:block">
            <div class="font-display text-base font-bold leading-tight text-white">TaskFlow</div>
            <div class="text-[10px] font-semibold tracking-widest text-brand-300">{{ roleTitle() }}</div>
        </div>
    </div>

    <nav class="flex flex-col gap-1">
        @for (item of items(); track item.route) {
        <a [routerLink]="item.route" routerLinkActive="nav-item-active" class="nav-item">
            <span class="grid h-5 w-5 shrink-0 place-items-center">
          @switch (item.icon) {
            @case ('tasks') {
              <svg viewBox="0 0 24 24" fill="none" class="h-5 w-5">
                <path d="M9 11l2 2 4-4m-9 9h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v10a2 2 0 002 2z"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            }
            @case ('team') {
              <svg viewBox="0 0 24 24" fill="none" class="h-5 w-5">
                <path d="M17 20h5v-2a4 4 0 00-3-3.87M9 20H4v-2a4 4 0 013-3.87m6-2.13a4 4 0 10-4-4 4 4 0 004 4zm6 0a3 3 0 10-2-5.24"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            }
          }
        </span>
            <span class="hidden lg:inline">{{ item.label }}</span>
        </a>
        }
    </nav>
</aside>
