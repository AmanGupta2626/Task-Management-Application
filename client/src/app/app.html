@if (auth.isLoggedIn()) {
  <header class="sticky top-0 z-40 border-b border-white/10 bg-slate-950/60 backdrop-blur-xl">
    <div class="mx-auto flex h-16 max-w-6xl items-center gap-6 px-4 sm:px-6">
      <div class="flex items-center gap-2 text-lg font-bold tracking-tight text-white">
        <span class="grid h-8 w-8 place-items-center rounded-lg bg-gradient-to-br from-brand-500 to-violet-500 text-base shadow-soft">✓</span>
        TaskFlow
      </div>

      <nav class="flex flex-1 items-center gap-1">
        <a routerLink="/tasks" routerLinkActive="!text-white !bg-white/10"
           class="rounded-lg px-3 py-2 text-sm font-medium text-slate-400 transition hover:bg-white/5 hover:text-white">
          Tasks
        </a>
        @if (auth.role() !== 'Employee') {
          <a routerLink="/team" routerLinkActive="!text-white !bg-white/10"
             class="rounded-lg px-3 py-2 text-sm font-medium text-slate-400 transition hover:bg-white/5 hover:text-white">
            Team
          </a>
        }
      </nav>

      <div class="flex items-center gap-3">
        <span class="pill bg-brand-500/20 text-brand-200 ring-1 ring-brand-500/30">{{ auth.currentUser()?.role }}</span>
        <span class="hidden text-sm font-medium text-slate-300 sm:inline">{{ auth.currentUser()?.username }}</span>
        <button class="btn-ghost" (click)="logout()">Logout</button>
      </div>
    </div>
  </header>
}

<main class="mx-auto max-w-6xl px-4 py-8 sm:px-6">
  <router-outlet />
</main>
