services:
  - type: web
    name: taskflow-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: MONGO_URI
        sync: false
      - key: CLIENT_ORIGIN
        sync: false

  - type: web
    name: taskflow-web
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist/client/browser
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
